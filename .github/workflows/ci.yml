name: CI
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://hirehub:hirehub@localhost:5432/hirehub?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-with-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-32-characters
    services:
      postgres:
        image: postgres:16-alpine
        env:
          {
            POSTGRES_USER: hirehub,
            POSTGRES_PASSWORD: hirehub,
            POSTGRES_DB: hirehub,
          }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hirehub" --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:deploy
      - run: npm run db:seed
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:desktop
